replicaCount: 1

image:
  repository: localhost:5000/pts-document-storage-service
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001

service:
  type: ClusterIP
  port: 8094

containerPort: 8094

env:
  SPRING_PROFILES_ACTIVE: dev
  SERVER_PORT: "8094"
  MINIO_URL: "http://minio.dev.svc.cluster.local:9000"
  MINIO_REGION: "fin-1"
  MINIO_IMG_BUCKET_NAME: "pts-document-storage"
  MINIO_IMG_SIGNATURE_DURATION: "3600"
  RABBIT_EXCHANGE_NAME: "domain.events"
  RABBIT_EXCHANGE_DURABLE: "true"
  RABBIT_EXCHANGE_AUTO_DELETE: "false"
  RABBIT_QUEUE_NAME: "document-storage.queue"
  RABBIT_QUEUE_DURABLE: true
  RABBIT_QUEUE_EXCLUSIVE: false
  RABBIT_QUEUE_AUTO_DELETE: false
  RABBIT_BINDING_ROUTING_KEY: "document.*"
  DATASOURCE_URL: "TODO_DATASOURCE_URL"
  REDIS_HOST: "TODO_REDIS_HOST"
  REDIS_PORT: "TODO_REDIS_HOST"

secretEnv:
  create: false
  name: ""
  values:
    MINIO_LOGIN: ""
    MINIO_PASSWORD: ""
    RABBITMQ_HOST: ""
    RABBITMQ_PORT: ""
    RABBITMQ_USERNAME: ""
    RABBITMQ_PASSWORD: ""
    RABBITMQ_VHOST: "/"
    DATASOURCE_USERNAME: ""
    DATASOURCE_PASSWORD: ""
    REDIS_PASSWORD: ""

existingSecretEnv:
  - name: pts-document-storage-service-s3-credentials
    keys:
      MINIO_LOGIN: S3_ACCESS_KEY
      MINIO_PASSWORD: S3_SECRET_KEY
  - name: pts-document-storage-service-rabbitmq-config
    keys:
      RABBITMQ_HOST: RABBITMQ_HOST
      RABBITMQ_PORT: RABBITMQ_PORT
      RABBITMQ_USERNAME: RABBITMQ_USERNAME
      RABBITMQ_PASSWORD: RABBITMQ_PASSWORD
      RABBITMQ_VHOST: RABBITMQ_VHOST
  - name: pts-document-storage-service-redis-config
    keys:
      REDIS_PASSWORD: REDIS_PASSWORD
  - name: pts-document-storage-service-datasource-config
    keys:
      DATASOURCE_USERNAME: DATASOURCE_USERNAME
      DATASOURCE_PASSWORD: DATASOURCE_PASSWORD

resources: {}

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
