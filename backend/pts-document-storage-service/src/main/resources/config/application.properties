spring.application.name=pts-document-storage-service
#logging
logging.pattern.console=%clr(%d{MM-dd-yy | HH:mm:ss.SSS}){blue} %clr(%-5p) %clr(%logger{0}){blue} %clr(%m){faint}%n
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.java.net.HttpURLConnection=DEBUG
#tomcat
server.shutdown=graceful
server.compression.enabled=true
server.tomcat.max-connections=8192
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20s
server.tomcat.keep-alive-timeout=20s
server.tomcat.max-keep-alive-requests=100
server.tomcat.accesslog.enabled=false
#http
server.http2.enabled=true
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB
server.tomcat.max-http-form-post-size=16MB
server.compression.min-response-size=2KB
spring.webflux.multipart.max-disk-usage-per-part=52428800
spring.webflux.multipart.max-headers-size=52428800
spring.webflux.multipart.max-in-memory-size=10485760
spring.webflux.multipart.max-size=52428800
# metrics
management.metrics.tags.application=${spring.application.name}
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
#datasource
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/master.yaml
spring.liquibase.drop-first=false
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=document_storage_schema
#minio
minio.url=${MINIO_URL}
minio.login=${MINIO_LOGIN}
minio.password=${MINIO_PASSWORD}
minio.region=${MINIO_REGION}
minio.img.bucket-name=${MINIO_IMG_BUCKET_NAME}
minio.img.signature.duration=${MINIO_IMG_SIGNATURE_DURATION}
minio.sdk-config.api-call-attempt-timeout=10
minio.sdk-config.api-call-timeout=60
minio.client-config.connection-timeout=5
minio.client-config.read-timeout=30
minio.client-config.write-timeout=30
#redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
cache.feed-ttl=${FEED_TTL}
# RABBIT-CONNECTION
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.connection-timeout=10000
# RABBIT-EXCHANGE
rabbit.exchange.name=${RABBIT_EXCHANGE_NAME}
rabbit.exchange.durable=${RABBIT_EXCHANGE_DURABLE:true}
rabbit.exchange.auto-delete=${RABBIT_EXCHANGE_AUTO_DELETE:false}
# RABBIT-QUEUE (document storage)
rabbit.document-storage-queue.name=${RABBIT_QUEUE_NAME}
rabbit.document-storage-queue.durable=${RABBIT_QUEUE_DURABLE:true}
rabbit.document-storage-queue.exclusive=${RABBIT_QUEUE_EXCLUSIVE:false}
rabbit.document-storage-queue.auto-delete=${RABBIT_QUEUE_AUTO_DELETE:false}
# RABBIT-BINDING
rabbit.document-storage-binding.routing-key=${RABBIT_BINDING_ROUTING_KEY:document.*}
# RABBIT-LISTENER
spring.rabbitmq.listener.simple.acknowledge-mode=manual
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.listener.simple.receive-timeout=30000
spring.rabbitmq.listener.simple.concurrency=5
spring.rabbitmq.listener.simple.max-concurrency=10
# RABBIT-PUBLISHER
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.reply-timeout=5000
#---
spring.config.activate.on-profile=prod
logging.level.org.springframework.web.client.RestTemplate=INFO
logging.level.java.net.HttpURLConnection=INFO
server.port=${PORT}
spring.datasource.hikari.maximum-pool-size=${DATASOURCE_MAX_POOL_SIZE:20}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=${DATASOURCE_DEFAULT_SCHEMA:document_storage_schema}
#---
spring.config.activate.on-profile=dev
server.port=${PORT:8081}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.default_schema=document_storage_schema