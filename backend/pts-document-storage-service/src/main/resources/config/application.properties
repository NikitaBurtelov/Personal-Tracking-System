spring.application.name=pts-document-storage-service
#logging
logging.pattern.console=%clr(%d{MM-dd-yy | HH:mm:ss.SSS}){blue} %clr(%-5p) %clr(%logger{0}){blue} %clr(%m){faint}%n
logging.level.org.springframework.web.client.RestTemplate=DEBUG
logging.level.java.net.HttpURLConnection=DEBUG
management.metrics.tags.application=${spring.application.name}
management.endpoints.web.exposure.include=health,info,metrics,httptrace,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
minio.url=
minio.login=
minio.password=
minio.region=
minio.img.bucket.name=
minio.img.signature.duration=
#http
server.http2.enabled=true
#---
spring.config.activate.on-profile=prod
server.port=
minio.url=
minio.login=
minio.password=
minio.region=
minio.img.bucket-name=
minio.img.signature.duration=
#---
spring.config.activate.on-profile=dev
server.port=${PORT:8081}
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.prefetch=10
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
minio.url=${MINIO_URL}
minio.login=${MINIO_LOGIN}
minio.password=${MINIO_PASSWORD}
minio.region=${MINIO_REGION}
minio.img.bucket-name=${MINIO_IMG_BUCKET_NAME}
minio.img.signature.duration=${MINIO_IMG_SIGNATURE_DURATION}

# EXCHANGE
rabbit.exchange.name=${RABBIT_EXCHANGE_NAME}
rabbit.exchange.durable=${RABBIT_EXCHANGE_DURABLE:true}
rabbit.exchange.auto-delete=${RABBIT_EXCHANGE_AUTO_DELETE:false}

# QUEUE (document storage)
rabbit.document-storage-queue.name=${RABBIT_QUEUE_NAME}
rabbit.document-storage-queue.durable=${RABBIT_QUEUE_DURABLE:true}
rabbit.document-storage-queue.exclusive=${RABBIT_QUEUE_EXCLUSIVE:false}
rabbit.document-storage-queue.auto-delete=${RABBIT_QUEUE_AUTO_DELETE:false}

# BINDING
rabbit.document-storage-binding.routing-key=${RABBIT_BINDING_ROUTING_KEY:document.*}